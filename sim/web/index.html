<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CYD Palm — Simulator</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #2b2b30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  /* the "case": a simple dark bezel around the 3:4 screen */
  #case {
    padding: 4vmin 4vmin 5vmin;
    background: #3a3a40;
    border-radius: 3vmin;
    box-shadow: 0 8px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  canvas {
    display: block;
    /* fill the viewport while keeping the Palm's 3:4 portrait aspect */
    width: min(88vw, 66vh);
    aspect-ratio: 3 / 4;
    image-rendering: pixelated;
    touch-action: none;              /* taps/strokes go to the Palm, not the page */
    background: #fff;
    border: 1px solid #111;
  }
  #status { color: #9a9aa2; font-size: 13px; margin-top: 12px; text-align: center; }
  #note   { color: #6e6e76; font-size: 11px; margin-top: 6px; max-width: 42em;
            text-align: center; padding: 0 12px; }
</style>
</head>
<body>
  <div id="case"><canvas id="lcd" width="240" height="320"></canvas></div>
  <div id="status">booting…</div>
  <div id="note">Your records live in this browser only (IndexedDB — other sites can't
    read it). Passwords are never saved, and sync is disabled here — please don't
    enter real credentials.</div>

<script src="palm.js"></script>
<script>
const W = 240, H = 320;
const canvas = document.getElementById('lcd');
const ctx = canvas.getContext('2d');
const img = ctx.createImageData(W, H);
const status = document.getElementById('status');

PalmSim().then((m) => {
  /* ---- SD card = IndexedDB: mount, restore, THEN boot the Palm ---- */
  try { m.FS.mkdir('/sdcard'); } catch (e) {}
  m.FS.mount(m.FS.filesystems.IDBFS, {}, '/sdcard');
  m.FS.syncfs(true, (err) => {
    if (err) console.warn('sdcard restore failed (starting fresh):', err);
    m._sim_boot();

    /* persist: scrub passwords out of config.ini FIRST, then write IndexedDB.
       Runs every few seconds and when the tab hides/closes. */
    let syncing = false;
    function persist(){
      if (syncing) return;
      syncing = true;
      m._sim_scrub_config();
      m.FS.syncfs(false, () => { syncing = false; });
    }
    setInterval(persist, 4000);
    addEventListener('pagehide', persist);
    document.addEventListener('visibilitychange', () => { if (document.hidden) persist(); });

    /* ---- pointer -> Palm touch (canvas CSS size -> 240x320 space) ---- */
    function xy(ev){
      const r = canvas.getBoundingClientRect();
      const x = Math.round((ev.clientX - r.left) * W / r.width);
      const y = Math.round((ev.clientY - r.top)  * H / r.height);
      return [Math.max(0, Math.min(W - 1, x)), Math.max(0, Math.min(H - 1, y))];
    }
    let down = false;
    canvas.addEventListener('pointerdown', (ev) => {
      canvas.setPointerCapture(ev.pointerId);
      down = true;
      const [x, y] = xy(ev);
      m._sim_pointer(x, y, 1);
      ev.preventDefault();
    });
    canvas.addEventListener('pointermove', (ev) => {
      if(!down) return;
      const [x, y] = xy(ev);
      m._sim_pointer(x, y, 1);
      ev.preventDefault();
    });
    function lift(ev){ if(down){ down = false; m._sim_pointer(0, 0, 0); ev.preventDefault(); } }
    canvas.addEventListener('pointerup', lift);
    canvas.addEventListener('pointercancel', lift);

    /* ---- frame loop: step LVGL by real elapsed time, blit the framebuffer ---- */
    const fbPtr = m._sim_fb();
    const fbLen = W * H * 4;
    let last = performance.now();
    function frame(now){
      m._sim_frame(Math.round(now - last));
      last = now;
      /* copy out of wasm memory (re-read HEAPU8 each frame: memory can grow) */
      img.data.set(m.HEAPU8.subarray(fbPtr, fbPtr + fbLen));
      ctx.putImageData(img, 0, 0);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    /* status: device-like heap readout (the budget the hardware would have) */
    function heap(){
      const free = m._sim_heap_freebytes();
      status.textContent = 'the real firmware UI in your browser · heap: '
                         + Math.round(free / 1024) + ' KB free';
    }
    heap();
    setInterval(heap, 2000);
  });
}).catch((e) => { status.textContent = 'failed to start: ' + e; });
</script>
</body>
</html>
